<!-- MODO MANTENIMIENTO (VERSIÓN CORREGIDA) -->
<!-- ============================================ -->

<style>
    /* Pantalla de mantenimiento (oculta por defecto) */
    #pantalla-mantenimiento {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #ff69b4, #ff1493);
        z-index: 99999;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: white;
        font-family: 'Quicksand', sans-serif;
    }

    /* Botón secreto (siempre visible, por encima de todo) */
    .btn-secreto {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: rgba(0,0,0,0.7);
        color: white;
        border: 2px solid #ff69b4;
        border-radius: 50px;
        padding: 12px 20px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        z-index: 999999;
        transition: all 0.3s ease;
        box-shadow: 0 0 10px rgba(255,105,180,0.5);
    }

    .btn-secreto:hover {
        background: #ff69b4;
        color: white;
        transform: scale(1.05);
    }

    /* Popup de contraseña */
    .popup-contraseña {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        z-index: 9999999;
        box-shadow: 0 0 50px rgba(0,0,0,0.5);
        display: none;
        flex-direction: column;
        gap: 15px;
        min-width: 280px;
    }

    .popup-contraseña input {
        padding: 12px;
        font-size: 16px;
        border: 2px solid #ff69b4;
        border-radius: 25px;
        text-align: center;
    }

    .popup-contraseña button {
        background: #ff69b4;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 25px;
        cursor: pointer;
        font-size: 16px;
    }

    .popup-contraseña button:hover {
        background: #ff1493;
    }

    .cerrar-popup {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 20px;
        cursor: pointer;
        color: #999;
    }

    .contenido-mantenimiento {
        background: rgba(255,255,255,0.2);
        padding: 40px;
        border-radius: 50px;
        backdrop-filter: blur(10px);
    }

    .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid white;
        border-top-color: transparent;
        border-radius: 50%;
        animation: girar 1s linear infinite;
        margin: 20px auto;
    }

    @keyframes girar {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>

<!-- Pantalla de mantenimiento (oculta al inicio) -->
<div id="pantalla-mantenimiento">
    <div class="contenido-mantenimiento">
        <h1 style="font-size: 4rem; margin: 0;">🚧</h1>
        <h2 style="font-size: 2rem; margin: 20px 0;">Página en mantenimiento</h2>
        <p style="font-size: 1.2rem;">Estamos preparando una sorpresa muy especial para ti... 🎁</p>
        <p style="font-size: 1rem; margin-top: 20px;">✨ Vuelve pronto ✨</p>
        <div class="spinner"></div>
    </div>
</div>

<!-- Popup para contraseña -->
<div id="popup-contraseña" class="popup-contraseña">
    <span class="cerrar-popup" onclick="cerrarPopup()">&times;</span>
    <h3>🔒 Acceso de administrador</h3>
    <p>Ingresa la contraseña para activar/desactivar el modo mantenimiento:</p>
    <input type="password" id="pass-input" placeholder="Contraseña">
    <button onclick="verificarContraseña()">Aceptar</button>
</div>

<!-- Botón secreto (siempre visible) -->
<button class="btn-secreto" onclick="mostrarPopup()">🔧 MANTENIMIENTO</button>

<script>
    // CONTRASEÑA CORRECTA (cámbiala por la que quieras)
    const CONTRASENA_ADMIN = "activar123";
    
    // Variable para saber si el modo mantenimiento está activo
    let modoMantenimientoActivo = false;

    // Función para DETENER todos los videos y sonidos
    function detenerTodosLosVideos() {
        const videos = document.querySelectorAll('video');
        videos.forEach(video => {
            video.pause();
            video.currentTime = 0;
        });
    }

    // Función para REANUDAR videos (opcional)
    function reanudarVideos() {
        // No reanudamos automáticamente, solo los dejamos en pausa
        // Para que la persona los active manualmente
    }

    // Función para mostrar el popup de contraseña
    function mostrarPopup() {
        document.getElementById('popup-contraseña').style.display = 'flex';
        document.getElementById('pass-input').value = '';
        document.getElementById('pass-input').focus();
    }

    // Función para cerrar el popup
    function cerrarPopup() {
        document.getElementById('popup-contraseña').style.display = 'none';
    }

    // Función para verificar la contraseña
    function verificarContraseña() {
        const inputPass = document.getElementById('pass-input').value;
        
        if (inputPass === CONTRASENA_ADMIN) {
            // Cambiar el estado del modo mantenimiento
            modoMantenimientoActivo = !modoMantenimientoActivo;
            
            if (modoMantenimientoActivo) {
                // ACTIVAR modo mantenimiento
                document.getElementById('pantalla-mantenimiento').style.display = 'flex';
                // DETENER TODOS LOS VIDEOS
                detenerTodosLosVideos();
                // Guardar en localStorage
                localStorage.setItem('modoMantenimiento', 'activo');
                alert('🔒 Modo mantenimiento ACTIVADO. Todos los videos se han detenido.');
            } else {
                // DESACTIVAR modo mantenimiento
                document.getElementById('pantalla-mantenimiento').style.display = 'none';
                localStorage.setItem('modoMantenimiento', 'inactivo');
                alert('🔓 Modo mantenimiento DESACTIVADO. La página vuelve a ser visible.');
            }
            
            cerrarPopup();
        } else {
            alert('❌ Contraseña incorrecta');
            document.getElementById('pass-input').value = '';
        }
    }

    // Observador para cuando se activa el modo mantenimiento desde localStorage
    function verificarYDetenerVideosSiEsNecesario() {
        const estadoGuardado = localStorage.getItem('modoMantenimiento');
        if (estadoGuardado === 'activo') {
            modoMantenimientoActivo = true;
            document.getElementById('pantalla-mantenimiento').style.display = 'flex';
            detenerTodosLosVideos();
        }
    }

    // Al cargar la página, verificar si el modo mantenimiento estaba activo
    window.addEventListener('load', () => {
        verificarYDetenerVideosSiEsNecesario();
    });
</script>

<!-- FIN MODO MANTENIMIENTO -->
